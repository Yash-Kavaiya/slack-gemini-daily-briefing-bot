display_information:
  name: Pulse
  description: Gemini-powered Slack agent with real-time search and daily briefings
features:
  bot_user:
    display_name: Pulse
    always_online: true
  slash_commands:
    - command: /pulse
      description: Ask Pulse a question
      usage_hint: "[your question]"
      should_escape: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - commands
      - im:history
      - im:read
      - im:write
      - channels:history
      - groups:history
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
  interactivity:
    is_enabled: true
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
